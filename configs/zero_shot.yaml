# Zero-shot MedSAM evaluation — no training, just inference with bbox prompts.

name: zero_shot
method: zero_shot

model:
  arch: vit_b
  checkpoint: checkpoints/medsam_vit_b.pth
  image_size: 1024   # MedSAM's native eval resolution; fits in 8GB at inference

data:
  root: data    # ISIC train/val/test_{images,masks} live directly under here
  test_sets:
    - name: isic2018_test
      kind: isic
      split: test
    - name: ph2
      kind: ph2
      root: data/ph2            # near-OOD: same modality (dermoscopy), different site/cameras
    - name: busi
      kind: busi
      root: data/busi           # far-OOD: ultrasound (different acoustic modality)
    - name: cbis_ddsm
      kind: cbis_ddsm
      root: data/cbis-ddsm      # far-OOD: mammography (X-ray) — test split only
      split: test
      abnormality_type: all     # use both mass and calc cases

eval:
  batch_size: 1            # CBIS-DDSM mammograms are ~72 MB raw; batch 1 is safest
  num_workers: 0           # avoid Windows worker-process OOM crashes on big TIFFs
  bbox_perturb_pixels: 0   # 0 = exact gt-derived bbox; >0 = simulate noisy prompts
  device: cuda

output:
  results_csv: results/runs.csv
  per_image_csv: results/raw/zero_shot_per_image.csv
